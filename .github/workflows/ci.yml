name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install pytest flake8
      - name: Run tests
        run: pytest -q
      - name: Run lint
        run: flake8 osiris_bridge_cli.py osiris_cockpit/tests --max-line-length=120 --extend-ignore=E402
